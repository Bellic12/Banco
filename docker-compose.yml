services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: banco
      POSTGRES_PASSWORD: banco
      POSTGRES_DB: banco
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banco"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "80:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://banco:banco@db:5432/banco
      AIRLINE_ACCOUNT_ID: "00000000-0000-0000-0000-000000000001"
      INSURER_ACCOUNT_ID: "00000000-0000-0000-0000-000000000002"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python -m banco.db.seed && uvicorn banco.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
